          description: List of coupon payments
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Asset not found or no coupon payments available
      security: []
      summary: Get coupon payments for a bond asset
      x-accepts:
      - application/json
  /v1/assets/{asset_id}/ytm:
    get:
      operationId: getAssetYTMById
      parameters:
      - explode: false
        in: path
        name: asset_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetYTMByIDResponse"
          description: Asset YTM details
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Asset not found
      security: []
      summary: Get annualized yield to maturity for a bond asset
      x-accepts:
      - application/json
  /v1/integrators/user:
    post:
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegratorUserRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCreatedResponse"
          description: User created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: Create a new user
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/user/{user_id}:
    delete:
      operationId: deleteUser
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDeletedResponse"
          description: User deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Unauthorized, only admin can delete users"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Forbidden, only admin can delete users"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: User not found
      summary: Delete user by ID
      x-accepts:
      - application/json
    get:
      operationId: getUserById
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"
          description: User details
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: User not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: Get user by ID (admin only)
      x-accepts:
      - application/json
  /v1/user/self:
    get:
      operationId: getUserSelf
