openapi: 3.1.0
info:
  title: DORA
  version: 1.0.0
servers:
- description: DORA staging API server
  url: https://staging.dora.co/
- description: DORA staging Websocket API server
  url: wss://staging.dora.co/
- description: DORA production API server
  url: https://prod.dora.co/
- description: DORA production Websocket API server
  url: wss://prod.dora.co/
security:
- bearerAuth: []
- apiKeyAuthHeader: []
paths:
  /v1/assets:
    get:
      operationId: listAssets
      parameters:
      - explode: true
        in: query
        name: created_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: created_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Asset kind (BOND, CURRENCY, INTEREST, POOL_SHARE)"
        explode: true
        in: query
        name: asset_kind
        required: false
        schema:
          $ref: "#/components/schemas/AssetKind"
        style: form
      - explode: true
        in: query
        name: can_add_liquidity
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_direct_borrow
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_onboard
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_trade
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_virtual_borrow
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetsResponse"
          description: A list of assets
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      security: []
      summary: List assets
      x-accepts:
      - application/json
  /v1/assets/{asset_id}:
    get:
      operationId: getAssetById
      parameters:
      - explode: false
        in: path
        name: asset_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetByIDResponse"
          description: Asset details
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Asset not found
      security: []
      summary: Get asset by ID
      x-accepts:
      - application/json
  /v1/assets/{asset_id}/coupon_payments:
    get:
      operationId: getCouponPaymentsByAssetId
      parameters:
      - explode: false
