        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PLResponse"
          description: List of user accounts with a PL breakdown by asset and summary
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Unauthorized, user is not logged in"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: User not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: Get account-by-account PL breakdown for the logged in user
      x-accepts:
      - application/json
  /v1/realized_pnl_settlements:
    get:
      operationId: getRealizedPnlSettlements
      parameters:
      - explode: true
        in: query
        name: user_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: position_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: created_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: settled_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: is_settled
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRealizedPnlSettlementsResponse"
          description: List of realized P&L settlements with filters applied
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Unauthorized, user is not logged in"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Forbidden, user does not have access"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: Get realized P&L settlements with filters
      x-accepts:
      - application/json
  /v1/realized_pnl_settlements/{settlement_id}:
    put:
      operationId: settleRealizedPnlRecord
      parameters:
      - explode: false
        in: path
        name: settlement_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettleRealizedPnlRecordResponse"
          description: The realized P&L settlement record has been marked as settled
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Unauthorized, user is not logged in"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Forbidden, user does not have access"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: Mark a realized P&L settlement as settled
      x-accepts:
      - application/json
